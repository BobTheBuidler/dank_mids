name: Upload Python Package

on:
  release:
    branches:
      - master
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Build sdist
        run: uv build --sdist --out-dir dist

      - name: Verify sdist excludes generated binaries
        shell: bash
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          sdist, = Path("dist").glob("*.tar.gz")
          with tarfile.open(sdist) as tf:
              names = tf.getnames()
          generated = [
              name
              for name in names
              if (
                  name.endswith((".so", ".pyd", "/.git"))
                  or "/build/" in name
                  or "/.git/" in name
              )
          ]
          if generated:
              raise SystemExit("sdist includes generated artifacts:\n" + "\n".join(generated))
          PY

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp* *-musllinux_* *-win32"
          CIBW_TEST_COMMAND: "pytest {project}/tests/compiled_imports/test_compiled_imports.py"
          CIBW_TEST_ENVIRONMENT: >
            DANK_MIDS_COMPILED_IMPORT_MODE=installed-wheel
            PYTHONFAULTHANDLER=1
            PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
            TYPEDENVS_SHUTUP=1
          CIBW_TEST_REQUIRES: "pytest eth-brownie==1.22.0"
        with:
          output-dir: wheelhouse

      - name: Verify compiled wheel targets
        shell: bash
        run: uv run --only-group build python scripts/check_mypyc_wheel.py wheelhouse/*.whl

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    if: github.event_name != 'workflow_dispatch'
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_PASSWORD }}

  dry-run:
    if: github.event_name == 'workflow_dispatch'
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Skip publish on workflow_dispatch
        run: |
          echo "workflow_dispatch: built distributions without publishing."
