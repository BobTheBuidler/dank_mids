name: Upload Python Package

on:
  release:
    branches:
      - master
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Python
        uses: ./.github/actions/setup-python-cache
        with:
          python-version: "3.12"
          cache-dependency-path: |
            pyproject.toml
            poetry.lock

      - name: Load cached Poetry installation
        id: cached-poetry
        uses: actions/cache@v5
        with:
          path: ~/.local  # the path depends on the OS
          key: poetry-${{ runner.os }}-3.9-0  # increment to reset cache

      - name: Install Poetry
        if: steps.cached-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1

      - name: Build dist
        run: poetry build

      - name: Verify compiled wheel targets
        run: python scripts/check_mypyc_wheel.py dist/*.whl

      - name: Skip publish on workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch: skipping PyPI publish."

      - name: Publish
        if: github.event_name != 'workflow_dispatch'
        run: |
          poetry config pypi-token.pypi ${{ secrets.PYPI_PASSWORD }}
          poetry publish --no-interaction
