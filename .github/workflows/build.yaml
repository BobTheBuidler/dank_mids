name: Build Mypyc

on:
  pull_request:
    branches:
      - master
      - good-master
    paths:
      - '.github/actions/setup-python-cache/action.yml'
      - '.github/workflows/build.yaml'
      - 'scripts/run_mypyc_build.py'
      - '.gitmodules'
      - 'Makefile'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'requirements-build.txt'
      - 'dank_mids/**/*.py'
      - 'dank_mids/_vendor/aiolimiter'
      - 'dank_mids/_vendor/aiolimiter/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Update aiolimiter submodule
        run: make update-aiolimiter

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            pyproject.toml
            poetry.lock

      - name: Run Mypyc
        run: python scripts/run_mypyc_build.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mypyc-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            ./*__mypyc*.so
            ./*__mypyc*.pyd
            ./build/**/*.c
            ./build/**/*.h
            ./build/lib.*/**/*.so
            ./dank_mids/**/*.so
            ./dank_mids/**/*.pyd

  aggregate-ubuntu:
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Update aiolimiter submodule
        run: make update-aiolimiter

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: mypyc-*
          path: .
          merge-multiple: true

      - name: Re-apply Ubuntu 3.14 artifacts (canonical)
        uses: actions/download-artifact@v7
        with:
          pattern: mypyc-ubuntu-latest-py3.14
          path: .
          merge-multiple: true

      - name: Normalize C files for diffchecking
        # This makes it much easier to diffcheck changes in the C files
        shell: bash
        run: |
          # Insert DIFFCHECK_PLACEHOLDER macro at the top if not present
          for f in build/*.c; do
            if ! grep -q 'DIFFCHECK_PLACEHOLDER' "$f"; then
              sed -i '1i#ifndef DIFFCHECK_PLACEHOLDER\n#define DIFFCHECK_PLACEHOLDER 0\n#endif' "$f"
            fi
          done
          # Replace line number in CPy_AddTraceback with macro
          sed -i 's/\(CPy_AddTraceback([^,]*, *[^,]*, *\)[0-9]\+\(, *[^)]*)\)/\1DIFFCHECK_PLACEHOLDER\2/g' build/*.c
          # Replace index in CPyStatics[...] with macro
          sed -i 's/CPyStatics\[[0-9]\+\]/CPyStatics[DIFFCHECK_PLACEHOLDER]/g' build/*.c

      - name: Check for changes (Ubuntu)
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes_detected=true" >> $GITHUB_ENV
          else
            echo "changes_detected=false" >> $GITHUB_ENV
          fi

      - name: Commit changes (Ubuntu)
        if: env.changes_detected == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add .
          git commit -m "chore: compile to C for Linux x64 with mypyc"
          git push

      - name: Check for changes (aiolimiter)
        run: |
          if [[ -n $(git -C dank_mids/_vendor/aiolimiter status --porcelain) ]]; then
            echo "aiolimiter_changes_detected=true" >> $GITHUB_ENV
          else
            echo "aiolimiter_changes_detected=false" >> $GITHUB_ENV
          fi

      - name: Commit and push aiolimiter changes
        if: env.aiolimiter_changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.AIOLIMITER_TOKEN }}
        run: |
          cd dank_mids/_vendor/aiolimiter
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/BobTheBuidler/aiolimiter.git
          git add .
          if git diff --cached --quiet; then
            echo "No aiolimiter changes to commit."
            exit 0
          fi
          git commit -m "chore: add artifacts for dank-mids"
          git pull --rebase
          git push origin HEAD:mypyc

  update-submodule-pointer:
    needs: aggregate-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Update aiolimiter submodule pointer in main repo
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          make update-aiolimiter
          git add dank_mids/_vendor/aiolimiter
          if git diff --cached --quiet; then
            echo "No aiolimiter submodule pointer changes to commit."
            exit 0
          fi
          git commit -m "chore: update aiolimiter submodule pointer"
          git push
